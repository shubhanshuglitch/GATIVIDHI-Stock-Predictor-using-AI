# Railway Configuration for ML Service
# Place this in ml-service folder for Railway deployment

# Build
[build]
builder = "NIXPACKS"

# Environment
[deploy]
startCommand = "uvicorn app:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100

# Nixpacks config
[nixpacks]
pythonVersion = "3.11"
